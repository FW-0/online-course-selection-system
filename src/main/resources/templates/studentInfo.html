    <script>
        var content = [{title:"人体的奥秘"},{title:"如何学好英语"},{title:"大学生创新创业指导"},{title:"婚恋指导"},{title:"电影的艺术"},{title:"戏剧欣赏"},{title:"中药理学"},{title:"网页设计"},{title:"计算机网络导论"},{title:"化妆品学"},{title:"化学原理"},{title:"大学生计算机基础课程"},{title:"人工智能概论"},{title:"音乐鉴赏"},{title:"牛顿力学解析"},{title:"天文学"},{title:"药品的解析"},{title:"深入JVM"},{title:"爬虫原理"},{title:"浮力概述"},{title:"深入分布式"},{title:"Shiro与spring security"},{title:"zookeeper"},{title:"有趣的python"},{title:"人体系统论"},{title:"药草认识大全"},{title:"做一个健康的程序员"},{title:"脱发原理"},{title:"引力的奥秘"},// etc
        ];

        function getName(){
            var ele = $("#user");
            var ele2 = $("#admin");
            var name1;
            if (ele2.length > 0){
                name1 = ele2.html();
            }else{
                name1 = ele.html();
            }
            //console.log("name1:"+ name1);
            //name = name1;
            return name1;
        }

        $(function(){
            //监听搜索框
            $("#search").mouseover(function(){
                //alert("sas");
                $("#search").search({
                    source:content,
                });
            });
            //var name = document.getElementById("user").innerHTML;  这个语句有问题 如果没有该id值 直接报错。而不是返回空
            //console.log(name);
            load(1,"");
        });

        //使用$.ajax()发送异步请求
        function load(page,tCase){
            var fnname = getFnName(arguments.callee,4);
            //console.log(fnname); //打印出来了
            var name = getName();
            console.log("load:" + name);
            $.ajax({
                url:"/usercourse/studentInfo", // 请求路径
                type:"POST", //请求方式
                data:{"page":page,"limit":8,"username":name}, //默认 每页8条数据。
                dataType:"json",//data:{"username":"jack","age":23}, //  方式二 推荐使用这种方式
                success:function(data){  //这里的data可以随便命名 不过还是有点规则好一些
                    //alert(data);           //如result
                    fill(fnname,data,name);
                },//响应成功后的回调函数
                error:function(){
                    alert("出错啦...");
                },//表示如果请求响应出现错误，会执行的回调函数
                //dataType:"application/json"//设置接受到的响应数据的格式
            });
        };

        //填充表格数据!
        function fill(ftname,data,name){
            $("#pageNum").html("");
            $("#tbody").html("");
            //1.1展示总页码以及总记录数
            $("#totalPage").html(data.totalPage);
            $("#totalCount").html(data.totalCount);
            //console.log(ttCase);
            console.log("fill:" + name);
            console.log("ftname:" + ftname);
            var start;
            var end;
            //要显示5个页码
            if (data.totalPage < 5){
                //不够10页
                start = 1;
                end = data.totalPage;
            }else{
                //实现前二后二效果
                start = data.currentPage - 2;
                end = data.currentPage + 2;
                if (start < 1){
                    start = 1;
                    end = start + 4;
                }

                if (end > data.totalPage){
                    end = data.totalPage;
                    start = end - 4;
                }
            }
            //1.2 展示分页页码 onclick="selectOrCancel(' + course.courseId + ',' + true + ')">' +
            var lis = "";
            //var firstPage = template("firstHref",{
            //    ftname:ftname,ttCase:ttCase,name:name,
            //}); //展示首页
            var firstPage = "<a class=\"item\" onclick=\"" + ftname + "(" + 1 + ",'" + data.tCase + "'" + ")\">首页</a>";
            //console.log(firstPage);
            var before = data.currentPage - 1;
            if (before == 0){
                before = 1;
            }

            //展示 上一页 即 "＜"
            //var beforePage = template("before",{ftname:ftname,before:before,data:data,name:name});;
            var beforePage = "<a class = 'icon item' onclick = \"" + ftname + "(" + before + ",'" + data.tCase + "'" + ")\"><i\n" + "class = 'left chevron icon'></i></a>";
            var next = data.currentPage + 1;

            if (next >= data.totalPage){
                next = data.totalPage;
            }
            lis += firstPage;
            lis += beforePage;

            //展示 中间显示数字页码

            for (var j = start; j <= end; j++){
                //判断当前页码是否等于i
                //创建页码li
                var p;
                if (data.currentPage == j){
                    p = "<a class=\"active item\" onclick=\"" + ftname + "(" + j + ",'" + data.tCase + "'" + ")\">" + j + "</a>";
                }else{
                    p = "<a class=\"item\" onclick=\"" + ftname + "(" + j + ",'" + data.tCase + "'" + ")\">" + j + "</a>";
                }
                lis += p;
            }
            //展示 下一页 即"＞" 与 尾页
            //let html = template("hrefa",{ftname:ftname,next:next,data:data,name:name});
            var nextPage = "<a class = 'icon item' onclick = \"" + ftname + "(" + next + ",'" + data.tCase + "'" + ")\"><i\n" + "class = 'right chevron icon'></i></a>";
            var lastPage = "<a class=\"item\" onclick=\"" + ftname + "(" + data.totalPage + ",'" + data.tCase + "'" + ")\">尾页</a>";
            lis += nextPage;
            lis += lastPage;


            //展示数据表格信息
            var list = "";
            for (var i = 0; i < data.data.length; i++){
                var course = data.data[i];
                var tr = "<tr ";
                if(course.stock == 0){
                    tr += "class=\"error\"";
                    tr = tr + ">\n" + "<th>" + course.courseId + "</th>\n" + "<th>" + course.collegeName + "</th>\n" + "<th>" + course.courseName + "</th>\n" + "<th>" + course.teacher + "</th>\n" + "<th>" + course.type + "</th>\n" + "<th>" + course.courseScore + "</th>\n" + "<th>" + "已满人" + "</th>\n" + "<th>" + course.address + "</th>\n";
                }else{
                    if (course.stock <= 10 && course.stock > 0){
                        tr += "class=\"error\"";
                    }else if (course.stock > 10 && course.stock <= 25){
                        tr += "class=\"warning\"";
                    }
                    tr = tr + ">\n" + "<th>" + course.courseId + "</th>\n" + "<th>" + course.collegeName + "</th>\n" + "<th>" + course.courseName + "</th>\n" + "<th>" + course.teacher + "</th>\n" + "<th>" + course.type + "</th>\n" + "<th>" + course.courseScore + "</th>\n" + "<th>" + course.stock + "</th>\n" + "<th>" + course.address + "</th>\n";
                }
                if (name == "admin"){
                    tr += "<td><button  class = \"ui button\" " + ">" + "<i class = \"plus icon\"></i>无法操作</button></td>";
                }else{
                    //if (course.flag){
                        tr += "<td> <div class = \"ui animated fade button\" onclick=\"show('" + course.courseId + "','" + true + "','" + name + "','" + ftname + "','" + data.currentPage + "','" + data.tCase + "'" + ")\">" + "<div class = \"visible content\"><i class = \"check icon\"></i>已选</div>" + "<div  class = \"hidden content\"><i  class = \"genderless icon\"></i>退选</div>" + "</div></td>";
                    //}else{
                    //    tr += "<td><button id=\"select\" class = \"ui twitter button\" onclick=\"selectOrCancel('" + course.courseId + "'," + false + ",'" + name + "','" + ftname + "','" + data.currentPage + "','" + data.tCase + "'" + ")\">" + "<i class = \"plus icon\"></i>选择</button></td>";
                    //}
                }
                tr += "</tr>\n";
                list += tr;
            }
            //改变内容
            $("#pageNum").html(lis);
            $("#tbody").html(list);
        };

        //弹框提示。
        function show(courseId,flag,name,ftnamme,page,tCase){
            //console.log('******************* ' + courseId + "--" + flag + "--" + name + "--" + ftnamme + "--" + page + "--" + tCase);
            $("#alertUI").modal({
                onApprove:() => {
                    //console.log(courseId + "--" + flag + "--" + name + "--" + ftnamme + "--" + page + "--" + tCase);
                    selectOrCancel(courseId,flag,name,ftnamme,page,tCase);
                },
            }).modal("show");
        }

        //选择课程或取消课程
        function selectOrCancel(courseId,flag,name,ftnamme,page,tCase){
            //var name = getName();
            console.log("flag:" + flag);
            if (flag){
                $.ajax({
                    url:"usercourse/cancel", // 请求路径
                    type:"POST", //请求方式
                    //data: "username=jack&age=23",//请求参数 方式一
                    data:{"courseId":courseId,"username":name}, //  方式二 推荐使用这种方式
                    success:function(data){  //这里的data可以随便命名 不过还是有点规则好一些
                        $("#msg").text(data.msg);
                        $("#alertMsg").modal("show");
                        eval("" + ftnamme + "('" + page + "','" + tCase + "')");
                    },//响应成功后的回调函数
                    error:function(){
                        alert("出错啦...");
                    },//表示如果请求响应出现错误，会执行的回调函数
                });
            }else{
                $.ajax({
                    url:"usercourse/choose", // 请求路径
                    type:"POST", //请求方式
                    //data: "username=jack&age=23",//请求参数 方式一
                    data:{"courseId":courseId,"username":name}, //  方式二 推荐使用这种方式
                    success:function(data){  //这里的data可以随便命名 不过还是有点规则好一些
                        $("#msg").text(data.msg);
                        $("#alertMsg").modal("show");
                        eval("" + ftnamme + "('" + page + "','" + tCase + "')");
                    },//响应成功后的回调函数
                    error:function(){
                        alert("出错啦...");
                    },//表示如果请求响应出现错误，会执行的回调函数
                });
            }
            //console.log(name + "----" + courseId + "----" + flag);
        };

        //获取函数名.
        var getFnName = function(callee,length){
            var _callee = callee.toString().replace(/[\s\?]*/g,""),comb = _callee.length >= 50?50:_callee.length;
            _callee = _callee.substring(8,8 + length);
            //console.log(_callee); //验证成功。
            return _callee;
        };
        // 显示个人信息对话框
        function showUserInfoDialog() {
            // 获取当前用户名（从隐藏域获取）
            var username = getName();
            if (!username) {
                alert("未获取到用户信息，请重新登录");
                return;
            }

            // 调用后端接口获取个人信息
            $.ajax({
                url: "/user/getUserInfo",
                type: "POST",
                data: {"username": username},
                dataType: "json",
                success: function (user) {
                    if (user) {
                        // 填充个人信息到对话框
                        $("#infoName").text(user.studentName || "未知");
                        $("#infoUsername").text(user.username || "未知");
                        $("#infoMajor").text(user.object || "未知");
                        $("#infoRole").text(user.role || "学生");
                        // 显示对话框
                        $('#userInfoDialog').modal('show');
                    } else {
                        alert("获取个人信息失败");
                    }
                },
                error: function () {
                    alert("获取个人信息出错");
                }
            });
        }

        // 打开修改密码对话框
        function openChangePwdDialog() {
            // 隐藏个人信息对话框，显示修改密码对话框
            $('#userInfoDialog').modal('hide');
            // 清空输入框
            $("#oldPwd").val("");
            $("#newPwd").val("");
            $("#confirmPwd").val("");
            $('#changePwdDialog').modal('show');
        }

        // 处理修改密码
        function changePassword() {
            var username = getName();
            var oldPwd = $("#oldPwd").val();
            var newPwd = $("#newPwd").val();
            var confirmPwd = $("#confirmPwd").val();

            // 简单验证
            if (!oldPwd) {
                alert("请输入原密码");
                return;
            }
            if (!newPwd) {
                alert("请输入新密码");
                return;
            }
            if (newPwd !== confirmPwd) {
                alert("两次输入的新密码不一致");
                return;
            }

            // 调用后端修改密码接口
            $.ajax({
                url: "/user/changePassword",
                type: "POST",
                data: {
                    "username": username,
                    "oldPassword": oldPwd,
                    "newPassword": newPwd
                },
                dataType: "json",
                success: function (response) {
                    if (response.success) {
                        alert("密码修改成功，请重新登录");
                        // 关闭对话框并跳转到 logout（可选）
                        $('#changePwdDialog').modal('hide');
                        window.location.href = "/logout";
                    } else {
                        alert(response.msg || "修改密码失败");
                    }
                },
                error: function () {
                    alert("修改密码出错");
                }
            });
        }

    </script>
    <style>
        html, body {
            height: 100%;
            width: 100%;
            overflow: auto;
            margin: 0;
        }

        html {
            /*background: url(static/img/index.jpg) no-repeat center 0;*/
            overflow-y: scroll;
        }

        .ui.container {
            display: flex;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: #474e50;
            color: #FFFFFF;
            padding: 0.5rem 1rem;
            height: 60px; /* 固定高度，避免内容撑开 */
            display: flex;
            align-items: center; /* 垂直居中所有内容 */
        }
        /* 左侧内容：靠左对齐 */
        .left-content {
            position: absolute;
            left: 1rem; /* 距离左侧边距 */
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* 居中标题：相对于页面居中 */
        .center-title {
            position: absolute;
            left: 50%; /* 定位到页面水平中点 */
            transform: translateX(-50%); /* 向左偏移自身一半宽度，实现完全居中 */
            display: flex;
            align-items: center;
            height: 100%;
        }

        .center-title h1 {
            margin: 0;
            font-size: 1.8rem;
            white-space: nowrap; /* 防止标题换行 */
        }

        /* 右侧内容：靠右对齐 */
        .right-content {
            position: absolute;
            right: 1rem; /* 距离右侧边距 */
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* 调整菜单样式，避免重叠 */
        .ui.secondary.menu {
            margin: 0;
        }

        /* 主内容区下移，避免被固定头部遮挡 */
        .ui.container {
            margin-top: 100px !important; /* 根据头部高度调整 */
        }

        /* 搜索框和筛选按钮容器样式 */
        .search-filter-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        /* 统一按钮样式 */
        .search-filter-container .ui.button {
            margin-left: 5px;
        }

        /* 菜单链接样式 - 橙色背景和白色文字 */
        .menu-link {
            background-color: #ff8c00 !important;
            color: #474e50 !important;
            margin-right: 5px !important;
            border-radius: 4px !important;
            transition: background-color 0.3s ease !important;
        }

        /* 菜单链接悬停效果 */
        .menu-link:hover {
            background-color: #e67e00 !important; /* 深一点的橙色 */
        }
        /* 调整内容区域的最大宽度和居中显示 */
        .content-wrapper {
            max-width: 1200px; /* 可根据需要调整 */
            margin: 0 auto; /* 水平居中 */
            padding: 0 1rem; /* 左右内边距 */
        }
    </style>
</head>

<!--主容器-->
<div class = "ui container" th:width = "1500px">

        <table class = "ui selectable celled table" id = "courseTable" style = "text-align: center">
