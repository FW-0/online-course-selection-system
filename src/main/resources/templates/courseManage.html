<head>
    <title>课程管理</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <script th:src="@{/static/js/jquery-3.1.1.min.js}"></script>
    <script th:src="@{/static/js/template-web.js}"></script>
    <link th:href="@{/static/css/qinstyle.css}" rel="stylesheet">
    <link th:href="@{/static/layui-v2.5.5/css/layui.css}" rel="stylesheet" type="text/css"/>
    <script type="text/javascript" th:src="@{/static/layui-v2.5.5/layui.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common.js}"></script>

    <link type="text/css" href="https://cdn.bootcss.com/semantic-ui/2.4.1/semantic.min.css" rel="stylesheet">
    <script>
        var content = [{title: "人体的奥秘"}, {title: "如何学好英语"}, {title: "大学生创新创业指导"}, {title: "婚恋指导"}, {title: "电影的艺术"}, {title: "戏剧欣赏"}, {title: "中药理学"}, {title: "网页设计"}, {title: "计算机网络导论"}, {title: "化妆品学"}, {title: "化学原理"}, {title: "大学生计算机基础课程"}, {title: "人工智能概论"}, {title: "音乐鉴赏"}, {title: "牛顿力学解析"}, {title: "天文学"}, {title: "药品的解析"}, {title: "深入JVM"}, {title: "爬虫原理"}, {title: "浮力概述"}, {title: "深入分布式"}, {title: "Shiro与spring security"}, {title: "zookeeper"}, {title: "有趣的python"},{title: "人体系统论"},{title: "药草认识大全"},{title: "做一个健康的程序员"},{title: "脱发原理"},{title: "引力的奥秘"}];

        function getName() {
            var ele = $("#user");
            var name1;
            if (ele.length > 0){
                name1 = ele.html();
            }
            return name1;
        }

        $(function () {
            //监听搜索框
            $("#search").mouseover(function () {
                $("#search").search({
                    source: content,
                });
            });
            load(1, "");

            // 为每个卡片的标题添加点击事件监听器
            $('.card-header').on('click', function() {
                // 切换当前卡片的内容显示状态
                $(this).next('.filter-content').slideToggle();
                // 切换箭头图标的旋转状态
                $(this).find('.arrow-icon').toggleClass('chevron right icon chevron down icon');
            });

            // 主动触发第一个卡片的点击事件，使其默认打开
            $('.card-header:first').trigger('click');
        });


        //使用$.ajax()发送异步请求
        function load(page, tCase) {
            var fnname = getFnName(arguments.callee, 4);
            //console.log(fnname); //打印出来了
            var name = getName();
            console.log("load:" + name);
            $.ajax({
                url: "/course/getAll", // 请求路径
                type: "POST", //请求方式
                data: {"page": page, "limit": 8, "username": name}, //默认 每页8条数据。
                dataType: "json",//data:{"username":"jack","age":23}, //  方式二 推荐使用这种方式
                success: function (data) {  //这里的data可以随便命名 不过还是有点规则好一些
                    //alert(data);           //如result
                    fill(fnname, data, name);
                },//响应成功后的回调函数
                error: function () {
                    alert("出错啦...");
                },//表示如果请求响应出现错误，会执行的回调函数
                //dataType:"application/json"//设置接受到的响应数据的格式
            });
        };

        //根据课程类型搜索课程
        function selectCoursesByType(page, courseType) {
            var fnname = getFnName(arguments.callee, 19);
            //console.log("---"+fnname); //打印出来了
            var name = getName();
            console.log("selectCoursesByType:" + name);
            $.ajax({
                url: "/course/getCourseByType", // 请求路径
                type: "POST", //请求方式
                data: {"page": page, "limit": 8, "username": name, "courseType": courseType}, //默认 每页8条数据。
                dataType: "json", success: function (data) {  //这里的data可以随便命名 不过还是有点规则好一些
                    //alert(data);           //如result
                    //console.log(name + " ==== "); //拿到值了
                    fill(fnname, data, name);
                },//响应成功后的回调函数
                error: function () {
                    alert("出错啦...");
                },//表示如果请求响应出现错误，会执行的回调函数
                //dataType:"application/json"//设置接受到的响应数据的格式
            });
        };

        //根据课程所属学院搜索课程
        function selectCoursesBycollege(page, collegeName) {
            var fnname = getFnName(arguments.callee, 22);
            //console.log("---"+fnname); //打印出来了
            var name = getName();
            console.log("selectCoursesByCollege:" + name);
            $.ajax({
                url: "/course/getCourseByCollege", // 请求路径
                type: "POST", //请求方式
                data: {"page": page, "limit": 8, "username": name, "college": collegeName}, //默认 每页8条数据。
                dataType: "json", success: function (data) {  //这里的data可以随便命名 不过还是有点规则好一些
                    //alert(data);           //如result
                    //console.log(name + " ==== "); //拿到值了
                    fill(fnname, data, name);
                },//响应成功后的回调函数
                error: function () {
                    alert("出错啦...");
                },//表示如果请求响应出现错误，会执行的回调函数
                //dataType:"application/json"//设置接受到的响应数据的格式
            });
        };

        //根据课程剩余人数查找课程
        function selectByCount(page, count) {
            var fnname = getFnName(arguments.callee, 13);
            //console.log("---"+fnname); //打印出来了
            var name = getName();
            console.log("selectByCount:" + name);
            $.ajax({
                url: "/course/selectCourseByMemberCount", // 请求路径
                type: "POST", //请求方式
                data: {"page": page, "limit": 8, "username": name, "count": count}, //默认 每页8条数据。
                dataType: "json", success: function (data) {  //这里的data可以随便命名 不过还是有点规则好一些
                    //alert(data);           //如result
                    //console.log(name + " ==== "); //拿到值了
                    fill(fnname, data, name);
                },//响应成功后的回调函数
                error: function () {
                    alert("出错啦...");
                },//表示如果请求响应出现错误，会执行的回调函数
                //dataType:"application/json"//设置接受到的响应数据的格式
            });
        };

        //根据名称搜索课程
        function selectByCourseName(page,courseName){
            var fnname = getFnName(arguments.callee, 18);
            //console.log(fnname); //打印出来了
            var name = getName();
            console.log("search:" + name);
            //console.log(searchText);
            $.ajax({
                url:"/course/selectByCourseName", // 请求路径
                type:"POST", //请求方式
                data:{"page":page,"limit":8,"courseName":courseName,"username":name}, //默认 每页8条数据。
                dataType:"json",//data:{"username":"jack","age":23}, //  方式二 推荐使用这种方式
                success:function(data){  //这里的data可以随便命名 不过还是有点规则好一些
                    fill(fnname,data,name);
                },//响应成功后的回调函数
                error:function(){
                    alert("出错啦...");
                },//表示如果请求响应出现错误，会执行的回调函数
                //dataType:"application/json"//设置接受到的响应数据的格式
            });
        };


        //填充表格数据!
        function fill(ftname, data, name) {
            $("#pageNum").html("");
            $("#tbody").html("");
            //1.1展示总页码以及总记录数
            $("#totalPage").html(data.totalPage);
            $("#totalCount").html(data.totalCount);
            //console.log(ttCase);
            console.log("fill:" + name);
            console.log("ftname:" + ftname);
            var start;
            var end;
            //要显示5个页码
            if (data.totalPage < 5) {
                //不够10页
                start = 1;
                end = data.totalPage;
            } else {
                //实现前二后二效果
                start = data.currentPage - 2;
                end = data.currentPage + 2;
                if (start < 1) {
                    start = 1;
                    end = start + 4;
                }

                if (end > data.totalPage) {
                    end = data.totalPage;
                    start = end - 4;
                }
            }
            //1.2 展示分页页码 onclick="selectOrCancel(' + course.courseId + ',' + true + ')">' +
            var lis = "";
            //var firstPage = template("firstHref",{
            //    ftname:ftname,ttCase:ttCase,name:name,
            //}); //展示首页
            var firstPage = "<a class=\"item\" onclick=\"" + ftname + "(" + 1 + ",'" + data.tCase + "'" + ")\">首页</a>";
            //console.log(firstPage);
            var before = data.currentPage - 1;
            if (before == 0) {
                before = 1;
            }

            //展示 上一页 即 "＜"
            //var beforePage = template("before",{ftname:ftname,before:before,data:data,name:name});;
            var beforePage = "<a class = 'icon item' onclick = \"" + ftname + "(" + before + ",'" + data.tCase + "'" + ")\"><i\n" + "class = 'left chevron icon'></i></a>"
            var next = data.currentPage + 1;

            if (next >= data.totalPage) {
                next = data.totalPage;
            }
            lis += firstPage;
            lis += beforePage;

            //展示 中间显示数字页码

            for (var j = start; j <= end; j++) {
                //判断当前页码是否等于i
                //创建页码li
                var p;
                if (data.currentPage == j) {
                    p = "<a class=\"active item\" onclick=\"" + ftname + "(" + j + ",'" + data.tCase + "'" + ")\">" + j + "</a>";
                } else {
                    p = "<a class=\"item\" onclick=\"" + ftname + "(" + j + ",'" + data.tCase + "'" + ")\">" + j + "</a>";
                }
                lis += p;
            }
            //展示 下一页 即"＞" 与 尾页
            //let html = template("hrefa",{ftname:ftname,next:next,data:data,name:name});
            var nextPage = "<a class = 'icon item' onclick = \"" + ftname + "(" + next + ",'" + data.tCase + "'" + ")\"><i\n" + "class = 'right chevron icon'></i></a>";
            var lastPage = "<a class=\"item\" onclick=\"" + ftname + "(" + data.totalPage + ",'" + data.tCase + "'" + ")\">尾页</a>";
            lis += nextPage;
            lis += lastPage;


            //展示数据表格信息
            var list = "";
            for (var i = 0; i < data.data.length; i++) {
                var course = data.data[i];
                var tr = "<tr ";
                if(course.stock == 0){
                    tr += "class=\"error\"";
                    tr = tr + ">\n" + "<th>" + course.courseId + "</th>\n" + "<th>" + course.collegeName + "</th>\n" + "<th>" + course.courseName + "</th>\n" + "<th>" + course.teacher + "</th>\n" + "<th>" + course.type + "</th>\n" + "<th>" + course.courseScore + "</th>\n" + "<th>" + "已满人" + "</th>\n" + "<th>" + course.address + "</th>\n";
                }else{
                    if (course.stock <= 10 && course.stock > 0){
                        tr += "class=\"error\"";
                    }else if (course.stock > 10 && course.stock <= 25){
                        tr += "class=\"warning\"";
                    }
                    tr = tr + ">\n" + "<th>" + course.courseId + "</th>\n" + "<th>" + course.collegeName + "</th>\n" + "<th>" + course.courseName + "</th>\n" + "<th>" + course.teacher + "</th>\n" + "<th>" + course.type + "</th>\n" + "<th>" + course.courseScore + "</th>\n" + "<th>" + course.stock + "</th>\n" + "<th>" + course.address + "</th>\n";
                }
                var operationTd = "<td>";
                if (course.isHide == 1) {
                    operationTd += "<div class = \"ui animated fade button\" onclick=\"show('" + course.courseId + "','" + true + "','" + name + "','" + ftname + "','" + data.currentPage + "','" + data.tCase + "'" + ")\">" + "<div class = \"visible content\"><i class = \"check icon\"></i>已开放显示</div>" + "<div  class = \"hidden content\"><i  class = \"genderless icon\"></i>隐藏</div>" + "</div>";
                } else {
                    operationTd += "<button id=\"select\" class = \"ui twitter button\" onclick=\"hideOrShowCourse('" + course.courseId + "','" + false + "','" + name + "','" + ftname + "','" + data.currentPage + "','" + data.tCase + "'" + ")\">" + "<i class = \"plus icon\"></i>开放显示</button>";
                }
                // 添加修改按钮到操作列
                operationTd += `<button class = "ui button" onclick="editCourse('${course.courseId}', '${course.courseName}', '${course.collegeId}', '${course.teacher}', '${course.type}', '${course.courseScore}', '${course.stock}', '${course.address}','${course.description}')">修改</button>`;
                operationTd += "</td>";
                tr += operationTd;
                tr += "</tr>\n";
                list += tr;
            }
            //改变内容
            $("#pageNum").html(lis);
            $("#tbody").html(list);
        };

        //弹框提示。
        function show(courseId, flag, name, ftnamme, page, tCase) {
            //console.log('******************* ' + courseId + "--" + flag + "--" + name + "--" + ftnamme + "--" + page + "--" + tCase);
            $('#alertUI').modal({
                onApprove: () => {
                    //console.log(courseId + "--" + flag + "--" + name + "--" + ftnamme + "--" + page + "--" + tCase);
                    hideOrShowCourse(courseId,flag,name,ftnamme,page,tCase);
                }
            }).modal('show');
        }

        //选择课程或取消课程
        function hideOrShowCourse(courseId, flag, name, ftnamme, page, tCase) {
            //var name = getName();
            console.log("flag:" + flag);
            if (flag) {
                $.ajax({
                    url: "course/hideBatch", // 请求路径
                    type: "POST", //请求方式
                    data: {"courseId": courseId, "username": name}, //  方式二 推荐使用这种方式
                    success: function (data) {  //这里的data可以随便命名 不过还是有点规则好一些
                        $('#msg').text(data.msg);
                        $('#alertMsg').modal('show');
                        eval(""+ftnamme+"('"+page+"','"+tCase+"')");
                    },//响应成功后的回调函数
                    error: function () {
                        alert("出错啦...")
                    },//表示如果请求响应出现错误，会执行的回调函数
                });
            }
            //console.log(name + "----" + courseId + "----" + flag);
        };

        //获取函数名.
        var getFnName = function (callee, length) {
            var _callee = callee.toString().replace(/[\s\?]*/g, ""), comb = _callee.length >= 50 ? 50 : _callee.length;
            _callee = _callee.substring(8, 8 + length);
            //console.log(_callee); //验证成功。
            return _callee;
        };

        //监听搜索框回车
        document.onkeydown = function (event) {
            var e = event || window.event || arguments.callee.caller.arguments[0];
            if (e && e.keyCode == 13) {
                sub();
            }
        };

        function sub(){
            //var searchText = $("#searchText").val();
            var searchText = document.getElementById("searchText").value;
            //console.log(searchText);
            if (searchText.length > 0) {
                //alert("搜索框回车监听:" + searchText + "---");
                selectByCourseName(1,searchText);
            }else{
                $("#msg").html("请输入搜索内容");
                $("#alertMsg").modal('show');
            }
        };

        // 跳转到修改课程页面
        function editCourse(courseId, courseName, collegeId, teacher, courseType, score, stock, address, description) {
            let url = `/editCourse?courseId=${courseId}&courseName=${encodeURIComponent(courseName)}&collegeId=${collegeId}&teacher=${encodeURIComponent(teacher)}&courseType=${encodeURIComponent(courseType)}&score=${score}&stock=${stock}&address=${encodeURIComponent(address)}&description=${encodeURIComponent(description)}`;
            window.location.href = url;
        }
    </script>
    <style>

            height: 100%;
            width: 100%;
            overflow: auto;

            overflow-y: scroll;
        }

        /* 主容器宽度调整 */
        .ui.container {
            width: 1300px !important; /* 增加主容器宽度至98%屏幕宽度 */
            margin: 100px auto 50px !important; /* 居中显示 */
            display: flex;

        .ui.twitter.button {

            color: #474e50;

            background-image: none;

<body>
<!-- 标题栏 -->
<div class="fixed-header">
    <!-- 左侧元素 -->
    <div class="left-content">
        <div class="ui secondary menu">
            <a class="item menu-link" th:href="@{/}">首页</a>
        </div>
    </div>

    <!-- 居中标题（相对于页面） -->
    <div class="center-title">
        <h1>网上在线选课系统</h1>
    </div>

    <!-- 右侧元素 -->
    <div class="right-content">
        <div class="ui secondary menu" sec:authorize="isAuthenticated()">
            <span class="hidden" hidden="hidden" id="user" sec:authentication="name"></span>

            <!-- 学生权限菜单 -->
            <div class="right menu" sec:authorize="hasAuthority('student')">
                <a class="item menu-link" th:href="@{/info}">
                    <i class="icon user"></i>
                    个人选课信息
                </a>
                <a class="item menu-link">
                    欢迎你,<span sec:authentication="principal.studentName"></span>
                </a>
                <a class="item menu-link" href="/logout">
                    <i class="sign-out icon"></i>注销
                </a>
            </div>
